name: 🏗️ Build Yalla Goal APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android Build Tools
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools"

      - name: 🖼️ Install ImageMagick
        run: sudo apt-get install -y imagemagick

      # ══════════════════════════════════════════
      # STEP 1 — إنشاء المشروع + www
      # ══════════════════════════════════════════
      - name: 🗂️ Create Project & www
        run: |
          mkdir -p yalla-goal/www
          # ننسخ index.html وأي ملفات أخرى إن وجدت
          cp -r * yalla-goal/www/ 2>/dev/null || true
          
          # تأكد من وجود ملف package.json صحيح
          cat > yalla-goal/package.json << 'EOF'
          {
            "name": "yalla-goal",
            "version": "2.3.0",
            "scripts": { "build": "echo ok" }
          }
          EOF

          echo "✅ www:"
          ls -lh yalla-goal/www/

      - name: 📥 Install Capacitor
        run: |
          cd yalla-goal
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: ⚙️ Capacitor Config
        run: |
          cat > yalla-goal/capacitor.config.json << 'EOF'
          {
            "appId": "com.yallagoal.app",
            "appName": "YallaGoal",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "cleartext": true,
              "allowNavigation": ["*"]
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            }
          }
          EOF

      - name: 🤖 Add Android Platform
        run: |
          cd yalla-goal
          npx cap add android

      # ══════════════════════════════════════════
      # STEP 2 — cap sync (يمسح assets ويعيد نسخها)
      # ══════════════════════════════════════════
      - name: 🔄 Capacitor Sync
        run: |
          cd yalla-goal
          npx cap sync android
          echo "=== assets بعد sync ==="
          find android/app/src/main/assets -type f 2>/dev/null | head -20

      # ══════════════════════════════════════════
      # STEP 3 — كل التعديلات بعد sync مباشرة
      # ══════════════════════════════════════════

      - name: 📄 Ensure All Web Assets are inside public (after sync)
        run: |
          ASSETS="yalla-goal/android/app/src/main/assets/public"
          mkdir -p "$ASSETS"
          # تم التعديل هنا لنسخ كافة محتويات www لتجنب الشاشة البيضاء
          cp -r yalla-goal/www/* "$ASSETS/"
          echo "✅ جميع ملفات الويب في assets:"
          ls -lh "$ASSETS/"

      - name: 🌐 Network Security Config
        run: |
          mkdir -p yalla-goal/android/app/src/main/res/xml
          cat > yalla-goal/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                      <certificates src="user"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

      - name: 📝 Write AndroidManifest.xml
        run: |
          cat > yalla-goal/android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

      - name: 🛠️ Write MainActivity.java (Fixed)
        run: |
          MAIN_ACTIVITY=$(find yalla-goal/android -name "MainActivity.java" | head -1)
          PACKAGE=$(grep -m1 "^package" "$MAIN_ACTIVITY" | sed 's/package //;s/;//' | tr -d '[:space:]')
          echo "Package: [$PACKAGE]"

          # تم حذف overriding لـ WebViewClient لأنه يعطل Capacitor Local Server
          cat > "$MAIN_ACTIVITY" << JAVAEOF
          package ${PACKAGE};

          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }

              @Override
              public void onStart() {
                  super.onStart();
                  fixWebViewSettings();
              }

              @SuppressLint("SetJavaScriptEnabled")
              private void fixWebViewSettings() {
                  try {
                      WebView webView = getBridge().getWebView();
                      if (webView == null) return;
                      WebSettings s = webView.getSettings();
                      s.setJavaScriptEnabled(true);
                      s.setDomStorageEnabled(true);
                      s.setDatabaseEnabled(true);
                      s.setAllowFileAccess(true);
                      s.setAllowContentAccess(true);
                      s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                      s.setMediaPlaybackRequiresUserGesture(false);
                      s.setUserAgentString(
                          "Mozilla/5.0 (Linux; Android 13; Pixel 7) " +
                          "AppleWebKit/537.36 (KHTML, like Gecko) " +
                          "Chrome/120.0.0.0 Mobile Safari/537.36"
                      );
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
          }
          JAVAEOF

      - name: 🔧 Fix app/build.gradle
        run: |
          cat >> yalla-goal/android/app/build.gradle << 'EOF'

          // ─── حل تعارض Kotlin stdlib ───
          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-common:1.9.0"
              }
          }
          EOF

      # ── الأيقونات بعد sync وبعد تعديل الـ res ──
# ── الأيقونات: حذف الافتراضي تماماً وإجبار النظام على استخدام صورتك ──
# ── الحل النهائي لإجبار الأيقونة على الظهور بعد التثبيت ──
# ── الحل النهائي لإجبار الأيقونة على الظهور بعد التثبيت ──
# ── الحل النهائي لإجبار الأيقونة على الظهور بعد التثبيت ──
# ── الحل المضمون 100% لتوليد الأيقونات بدون أخطاء EOF ──
      - name: 🖼️ Setup Proper Adaptive Icons
        run: |
          ICON_URL="https://raw.githubusercontent.com/ossamasal2012/logo/refs/heads/main/Screenshot%202026-04-21%201.52.19%20PM.png"
          curl -L "$ICON_URL" -o /tmp/icon.png
          
          BASE="yalla-goal/android/app/src/main/res"

          # 1️⃣ تنظيف المجلدات
          rm -rf $BASE/mipmap-*
          mkdir -p $BASE/drawable

          # 2️⃣ إنشاء ملف الخلفية (طريقة السطر الواحد لتجنب أخطاء EOF)
          echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#000000" android:pathData="M0,0h108v108h0z"/></vector>' > $BASE/drawable/ic_launcher_background.xml

          declare -A SIZES=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for DIR in "${!SIZES[@]}"; do
            SIZE=${SIZES[$DIR]}
            mkdir -p "$BASE/$DIR"

            # توليد الأيقونة العادية والدائرية
            convert /tmp/icon.png -resize ${SIZE}x${SIZE}^ -gravity center -extent ${SIZE}x${SIZE} -background "#000000" "$BASE/$DIR/ic_launcher.png"
            convert /tmp/icon.png -resize ${SIZE}x${SIZE}^ -gravity center -extent ${SIZE}x${SIZE} -background "#000000" "$BASE/$DIR/ic_launcher_round.png"

            # 3️⃣ إنشاء ملف تعريف الأيقونة (Adaptive Icon) بطريقة السطر الواحد
            echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background" /><foreground android:drawable="@mipmap/ic_launcher_foreground" /></adaptive-icon>' > $BASE/$DIR/ic_launcher.xml
            cp $BASE/$DIR/ic_launcher.xml $BASE/$DIR/ic_launcher_round.xml

            # توليد الصورة الأمامية (Foreground)
            convert /tmp/icon.png -resize $((SIZE*80/100))x$((SIZE*80/100)) -gravity center -background none -extent ${SIZE}x${SIZE} "$BASE/$DIR/ic_launcher_foreground.png"
          done
          echo "✅ Icons generated successfully without EOF issues!"
      # ── تحقق نهائي ──
      - name: 🔍 Final Verification
        run: |
          echo "=== assets/public ==="
          find yalla-goal/android/app/src/main/assets -type f
          echo ""
          echo "=== res/mipmap-xxxhdpi ==="
          ls -lh yalla-goal/android/app/src/main/res/mipmap-xxxhdpi/ 2>/dev/null || echo "مجلد غير موجود"
          echo ""
          echo "=== AndroidManifest ==="
          cat yalla-goal/android/app/src/main/AndroidManifest.xml

      - name: 🔐 Grant Gradle Permission
        run: chmod +x yalla-goal/android/gradlew

      - name: 🏗️ Build Debug APK
        run: |
          cd yalla-goal/android
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "══════════════════════════════════════"
            echo "❌ الخطأ الحقيقي:"
            grep -A 5 "What went wrong\|error:\|Caused by" /tmp/gradle_output.txt | head -40
            echo "══════════════════════════════════════"
            exit 1
          fi

      - name: 🔍 Find APK
        run: |
          APK_PATH=$(find yalla-goal/android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then echo "❌ APK not found!"; exit 1; fi
          echo "✅ APK: $APK_PATH"
          ls -lh "$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaGoal-v2.3-debug
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: 📋 Upload Gradle Log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_output.txt
          retention-days: 7

      - name: ✅ Build Summary
        run: |
          echo "=========================================="
          echo "✅ يلا گول APK جاهز ومُعدل!"
          echo "📄 assets: ✅ تم نسخ كامل مجلد الويب لتجنب الشاشة البيضاء"
          echo "🖼️  الأيقونة: ✅ مولّدة من مسار الـ GitHub المخصص"
          echo "☕ Java: 21"
          echo "🌐 WebView: ✅ تم إصلاح مشكلة ERR_CONNECTION_REFUSED"
          echo "🎬 HLS / M3U8: ✅ مدعوم"
          echo "=========================================="
