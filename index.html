<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSSAMA TV - Premium Streaming</title>
    <!-- Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.9/shaka-player.ui.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.9/controls.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa841e;
            --bg-black: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-gray: #b0b0b0;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body, html {
            margin: 0; padding: 0; background: var(--bg-black); color: white;
            width: 100%; height: 100%; overflow-x: hidden;
        }

        /* Header & Logo */
        header {
            background: linear-gradient(to bottom, #151515, var(--bg-black));
            padding: 20px; text-align: center; border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-size: 2rem; font-weight: bold; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Main Container */
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; min-height: 80vh; }

        /* Grid Layout */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        /* Card Style */
        .card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            border: 1px solid #333; transition: var(--transition); position: relative;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-10px); border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
        }

        .card img { width: 100%; height: 150px; object-fit: cover; border-bottom: 1px solid #333; }
        
        .card-info { padding: 12px; text-align: center; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; color: #fff; }

        .card-actions {
            position: absolute; top: 10px; left: 10px; display: flex; gap: 5px;
            opacity: 0; transition: var(--transition);
        }
        .card:hover .card-actions { opacity: 1; }

        .btn-action {
            background: rgba(0,0,0,0.7); color: #fff; border: 1px solid var(--gold);
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
        .btn-action:hover { background: var(--gold); color: black; }

        /* Floating Action Button */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--gold); color: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; z-index: 1000;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            transition: var(--transition);
        }
        .fab:hover { transform: rotate(90deg) scale(1.1); background: #fff; }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1a1a1a; width: 90%; max-width: 500px; padding: 25px;
            border-radius: 15px; border: 1px solid var(--gold); position: relative;
        }
        .modal-header { font-size: 1.5rem; color: var(--gold); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-gray); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: #000; border: 1px solid #444;
            color: white; border-radius: 8px; outline: none; transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--gold); }

        .btn-submit {
            width: 100%; padding: 12px; background: var(--gold); border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;
            margin-top: 10px; transition: var(--transition);
        }
        .btn-submit:hover { background: var(--dark-gold); }

        /* Video Player Overlay */
        #player-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; display: none;
        }
        .close-player {
            position: absolute; top: 20px; left: 20px; z-index: 3001;
            background: rgba(212, 175, 55, 0.7); border: none; padding: 10px 15px;
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* Video Filters from User Requirement */
        video { 
            width: 100%; height: 100%; object-fit: contain;
            filter: contrast(1.1) saturate(1.2) brightness(1.05);
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .shaka-spinner { border-top-color: var(--gold) !important; }

        /* Navigation Breadcrumb */
        .breadcrumb {
            margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;
        }
        .breadcrumb span { color: var(--gold); cursor: pointer; }
        .breadcrumb i { font-size: 0.8rem; color: #555; }

        .no-data { text-align: center; padding: 50px; color: #555; font-size: 1.2rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <div class="logo">OSSAMA TV</div>
    </header>

    <div class="container">
        <div id="breadcrumb-container" class="breadcrumb" style="display: none;">
            <span onclick="renderGroups()">الرئيسية</span>
            <i class="fas fa-chevron-left"></i>
            <span id="current-group-name">المجموعة</span>
        </div>

        <div id="main-grid" class="grid">
            <!-- Content dynamicly loaded -->
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab" onclick="toggleOptionModal()">
        <i class="fas fa-plus"></i>
    </div>

    <!-- Selection Modal -->
    <div id="option-modal" class="modal" onclick="closeModal(event, 'option-modal')">
        <div class="modal-content">
            <div class="modal-header">ماذا تريد أن تضيف؟</div>
            <div style="display: flex; gap: 15px;">
                <button class="btn-submit" onclick="openAddModal('group')">إضافة مجموعة</button>
                <button class="btn-submit" onclick="openAddModal('channel')">إضافة قناة</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="data-modal" class="modal" onclick="closeModal(event, 'data-modal')">
        <div class="modal-content">
            <div id="modal-title" class="modal-header">إضافة جديد</div>
            <form id="data-form">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="item-type">
                
                <div class="form-group">
                    <label id="label-name">الاسم</label>
                    <input type="text" id="input-name" required placeholder="مثلاً: قنوات رياضية">
                </div>

                <div class="form-group" id="url-group">
                    <label>رابط البث (URL)</label>
                    <input type="text" id="input-url" placeholder="https://example.com/stream.mpd">
                </div>

                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="text" id="input-image" placeholder="https://image-link.com/img.jpg">
                </div>

                <div class="form-group" id="parent-group-select" style="display:none;">
                    <label>إضافة إلى مجموعة</label>
                    <select id="input-parent"></select>
                </div>

                <button type="submit" class="btn-submit">حفظ البيانات</button>
            </form>
        </div>
    </div>

    <!-- Video Player Container -->
    <div id="player-container">
        <button class="close-player" onclick="stopPlayer()">إغلاق <i class="fas fa-times"></i></button>
        <div data-shaka-player-container class="shaka-video-container">
            <video id="dash-video" data-shaka-player autoplay crossorigin="anonymous" playsinline></video>
        </div>
    </div>

    <script>
        // --- Data Management ---
        let groups = JSON.parse(localStorage.getItem('ossama_groups')) || [];
        let channels = JSON.parse(localStorage.getItem('ossama_channels')) || [];
        let currentView = 'groups'; // 'groups' or 'channels'
        let activeGroupId = null;

        const mainGrid = document.getElementById('main-grid');
        const breadcrumb = document.getElementById('breadcrumb-container');
        const dataForm = document.getElementById('data-form');

        function saveData() {
            localStorage.setItem('ossama_groups', JSON.stringify(groups));
            localStorage.setItem('ossama_channels', JSON.stringify(channels));
        }

        // --- Rendering ---
        function renderGroups() {
            currentView = 'groups';
            activeGroupId = null;
            breadcrumb.style.display = 'none';
            mainGrid.innerHTML = '';

            if (groups.length === 0) {
                mainGrid.innerHTML = '<div class="no-data">لا توجد مجموعات حالياً. اضغط + للإضافة.</div>';
                return;
            }

            groups.forEach(group => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="btn-action" onclick="event.stopPropagation(); deleteItem('group', '${group.id}')"><i class="fas fa-trash"></i></button>
                        <button class="btn-action" onclick="event.stopPropagation(); editItem('group', '${group.id}')"><i class="fas fa-edit"></i></button>
                    </div>
                    <img src="${group.image || 'https://via.placeholder.com/300x150/111/d4af37?text=OSSAMA+TV'}" onerror="this.src='https://via.placeholder.com/300x150/111/d4af37?text=Image+Error'">
                    <div class="card-info">
                        <div class="card-title">${group.name}</div>
                        <div style="color:var(--gold); font-size:0.8rem">${channels.filter(c => c.parentId === group.id).length} قناة</div>
                    </div>
                `;
                card.onclick = () => renderChannels(group.id);
                mainGrid.appendChild(card);
            });
        }

        function renderChannels(groupId) {
            currentView = 'channels';
            activeGroupId = groupId;
            const group = groups.find(g => g.id === groupId);
            
            breadcrumb.style.display = 'flex';
            document.getElementById('current-group-name').innerText = group.name;
            mainGrid.innerHTML = '';

            const filteredChannels = channels.filter(c => c.parentId === groupId);

            if (filteredChannels.length === 0) {
                mainGrid.innerHTML = '<div class="no-data">لا توجد قنوات في هذه المجموعة.</div>';
                return;
            }

            filteredChannels.forEach(chan => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="btn-action" onclick="event.stopPropagation(); deleteItem('channel', '${chan.id}')"><i class="fas fa-trash"></i></button>
                        <button class="btn-action" onclick="event.stopPropagation(); editItem('channel', '${chan.id}')"><i class="fas fa-edit"></i></button>
                    </div>
                    <img src="${chan.image || 'https://via.placeholder.com/300x150/111/d4af37?text=Channel'}" onerror="this.src='https://via.placeholder.com/300x150/111/d4af37?text=Image+Error'">
                    <div class="card-info">
                        <div class="card-title">${chan.name}</div>
                        <div style="color:#888; font-size:0.8rem">بث مباشر</div>
                    </div>
                `;
                card.onclick = () => startPlayer(chan.url);
                mainGrid.appendChild(card);
            });
        }

        // --- CRUD Operations ---
        function openAddModal(type) {
            document.getElementById('option-modal').style.display = 'none';
            document.getElementById('data-modal').style.display = 'flex';
            dataForm.reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('item-type').value = type;
            
            const urlGroup = document.getElementById('url-group');
            const parentSelect = document.getElementById('parent-group-select');
            
            if (type === 'group') {
                document.getElementById('modal-title').innerText = 'إضافة مجموعة جديدة';
                urlGroup.style.display = 'none';
                parentSelect.style.display = 'none';
            } else {
                document.getElementById('modal-title').innerText = 'إضافة قناة جديدة';
                urlGroup.style.display = 'block';
                parentSelect.style.display = 'block';
                
                const select = document.getElementById('input-parent');
                select.innerHTML = groups.map(g => `<option value="${g.id}" ${g.id === activeGroupId ? 'selected' : ''}>${g.name}</option>`).join('');
            }
        }

        function editItem(type, id) {
            const item = (type === 'group') ? groups.find(g => g.id === id) : channels.find(c => c.id === id);
            if (!item) return;

            openAddModal(type);
            document.getElementById('modal-title').innerText = 'تعديل البيانات';
            document.getElementById('edit-id').value = item.id;
            document.getElementById('input-name').value = item.name;
            document.getElementById('input-image').value = item.image;
            if (type === 'channel') {
                document.getElementById('input-url').value = item.url;
                document.getElementById('input-parent').value = item.parentId;
            }
        }

        function deleteItem(type, id) {
            if (confirm('هل أنت متأكد من الحذف؟')) {
                if (type === 'group') {
                    groups = groups.filter(g => g.id !== id);
                    channels = channels.filter(c => c.parentId !== id);
                } else {
                    channels = channels.filter(c => c.id !== id);
                }
                saveData();
                currentView === 'groups' ? renderGroups() : renderChannels(activeGroupId);
            }
        }

        dataForm.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value || Date.now().toString();
            const type = document.getElementById('item-type').value;
            const name = document.getElementById('input-name').value;
            const image = document.getElementById('input-image').value;
            
            if (type === 'group') {
                const index = groups.findIndex(g => g.id === id);
                const groupData = { id, name, image };
                if (index > -1) groups[index] = groupData;
                else groups.push(groupData);
            } else {
                const url = document.getElementById('input-url').value;
                const parentId = document.getElementById('input-parent').value;
                const index = channels.findIndex(c => c.id === id);
                const channelData = { id, name, image, url, parentId };
                if (index > -1) channels[index] = channelData;
                else channels.push(channelData);
            }

            saveData();
            document.getElementById('data-modal').style.display = 'none';
            currentView === 'groups' ? renderGroups() : renderChannels(activeGroupId);
        };

        // --- UI Logic ---
        function toggleOptionModal() {
            document.getElementById('option-modal').style.display = 'flex';
        }

        function closeModal(e, id) {
            if (e.target.id === id) {
                document.getElementById(id).style.display = 'none';
            }
        }

        // --- Shaka Player Integration (Exact Implementation from User) ---
        let player;
        let ui;

        async function initShaka() {
            const video = document.getElementById('dash-video');
            ui = video['ui'];
            const controls = ui.getControls();
            player = controls.getPlayer();

            // فلتر تخطي حماية السيرفر
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
            });

            player.configure({
                abr: { enabled: true, switchInterval: 1 },
                streaming: {
                    bufferingGoal: 45,
                    rebufferingGoal: 2,
                    // تم حذف lowLatencyEnabled لأنه غير مدعوم في هذا الإصدار ويسبب خطأ
                    // وبدلاً من ذلك نستخدم إعدادات التخزين المؤقت لتحسين الأداء
                    retryParameters: {
                        maxAttempts: 5,
                        baseDelay: 1000,
                        backoffFactor: 2
                    }
                }
            });
        }

        async function startPlayer(url) {
            document.getElementById('player-container').style.display = 'block';
            try {
                await player.load(url);
            } catch (e) {
                console.error('Load Error:', e);
                // استخدام واجهة المستخدم بدلاً من alert
                const errorBox = document.createElement('div');
                errorBox.style = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; color:var(--gold); padding:20px; border:1px solid var(--gold); z-index:4000;";
                errorBox.innerText = "خطأ في تحميل القناة، تأكد من صحة الرابط.";
                document.body.appendChild(errorBox);
                setTimeout(() => { errorBox.remove(); stopPlayer(); }, 3000);
            }
        }

        function stopPlayer() {
            document.getElementById('player-container').style.display = 'none';
            player.unload();
        }

        // Initial Launch
        document.addEventListener('shaka-ui-loaded', () => {
            initShaka();
            renderGroups();
        });
        
        // Handling back behavior
        window.addEventListener('popstate', () => {
            if (currentView === 'channels') renderGroups();
        });

    </script>
</body>
</html>
