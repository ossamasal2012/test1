<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُرسل إشعارات Chromebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #2563eb; transition: all 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-50 rounded-full mb-3 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">مُجدول الإشعارات</h1>
            <p id="permStatus" class="text-sm mt-2 font-semibold"></p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">العنوان</label>
                <input type="text" id="title" placeholder="عنوان الإشعار" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">المحتوى</label>
                <textarea id="message" rows="2" placeholder="اكتب رسالتك هنا..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">وقت الإرسال (بعد ثوانٍ)</label>
                <input type="number" id="delay" value="5" min="1" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <button onclick="handleSchedule()" 
                class="btn-primary w-full text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
                </svg>
                <span>جدولة الآن</span>
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-sm p-3 rounded-xl hidden"></div>
        
        <div class="mt-6 p-4 bg-amber-50 rounded-xl border border-amber-100">
            <p class="text-xs text-amber-700 leading-relaxed">
                <b>ملاحظة لـ Chromebook:</b> لضمان عمل الإشعارات بعد إغلاق الصفحة، يرجى تشغيل الملف من خلال سيرفر محلي أو استضافة (HTTPS). المتصفح يمنع "عمال الخدمة" من روابط الـ Blob لأسباب أمنية.
            </p>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const permText = document.getElementById('permStatus');

        function updateUI() {
            if (!("Notification" in window)) {
                permText.textContent = "المتصفح لا يدعم الإشعارات ❌";
                permText.className = "text-sm mt-2 text-red-600 font-bold";
                return;
            }
            
            if (Notification.permission === "granted") {
                permText.textContent = "صلاحية الإشعارات مفعلة ✅";
                permText.className = "text-sm mt-2 text-green-600 font-bold";
            } else if (Notification.permission === "denied") {
                permText.textContent = "الصلاحية مرفوضة! يرجى تفعيلها ⚠️";
                permText.className = "text-sm mt-2 text-red-600 font-bold";
            } else {
                permText.textContent = "بانتظار الموافقة على الصلاحية ⏳";
                permText.className = "text-sm mt-2 text-amber-600 font-bold";
            }
        }

        updateUI();

        function showStatus(msg, isError = false) {
            statusDiv.textContent = msg;
            statusDiv.className = `mt-6 text-center text-sm p-3 rounded-xl block ${isError ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}`;
            setTimeout(() => statusDiv.classList.add('hidden'), 5000);
        }

        async function handleSchedule() {
            if (Notification.permission !== "granted") {
                const permission = await Notification.requestPermission();
                updateUI();
                if (permission !== "granted") {
                    showStatus("يجب السماح بالإشعارات أولاً", true);
                    return;
                }
            }

            const title = document.getElementById('title').value || "تنبيه";
            const msg = document.getElementById('message').value;
            const delaySec = parseInt(document.getElementById('delay').value) || 5;

            if (!msg) {
                showStatus("يرجى كتابة محتوى الرسالة", true);
                return;
            }

            showStatus(`سوف يصلك الإشعار بعد ${delaySec} ثانية...`);

            // استخدام setTimeout العادي كحل بديل لـ Service Worker في بيئات التطوير
            // سيعمل طالما المتصفح مفتوح. للعمل بعد الإغلاق التام يتطلب استضافة HTTPS حقيقية.
            setTimeout(() => {
                try {
                    const n = new Notification(title, {
                        body: msg,
                        icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png',
                        requireInteraction: true,
                        silent: false
                    });
                    
                    n.onclick = () => {
                        window.focus();
                        n.close();
                    };
                } catch (e) {
                    console.error("Notification error:", e);
                }
            }, delaySec * 1000);
            
            document.getElementById('message').value = '';
        }
    </script>
</body>
</html>
