<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل كود HTML الاحترافي - وضع ملء الشاشة الدائم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: all 0.3s ease;
        }

        .code-input {
            flex-grow: 1;
            background: #1e293b;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            line-height: 1.5;
        }

        #preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 9999;
            display: none;
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* تحسينات الواجهة */
        header {
            padding: 15px 25px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="editor-container">
        <header>
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <h1 class="mr-4 font-bold text-lg">محرك الأكواد المباشر (الوضع الدائم)</h1>
            </div>
            <button onclick="launchPreview()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-all transform active:scale-95">
                تشغيل ومعاينة (قفل ملء الشاشة)
            </button>
        </header>
        <textarea id="html-code" class="code-input" placeholder="اكتب كود HTML هنا..."></textarea>
    </div>

    <!-- طبقة المعاينة (Fullscreen Content) -->
    <div id="preview-overlay">
        <iframe id="preview-frame"></iframe>
        <!-- تم حذف زر الخروج نهائياً -->
    </div>

    <script>
        const editor = document.getElementById('html-code');
        const overlay = document.getElementById('preview-overlay');
        const frame = document.getElementById('preview-frame');
        const editorContainer = document.getElementById('editor-container');

        // استعادة الكود من التخزين المحلي عند التحميل
        window.onload = () => {
            const savedCode = localStorage.getItem('saved_html_code');
            const isPreviewActive = localStorage.getItem('is_preview_active');

            if (savedCode) {
                editor.value = savedCode;
            } else {
                // كود افتراضي
                editor.value = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: linear-gradient(45deg, #1e1b4b, #312e81); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
            text-align: center;
        }
        h1 { font-size: 3rem; }
        p { font-size: 1.5rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div>
        <h1>تم قفل العرض بنجاح</h1>
        <p>هذا الكود سيعمل بوضع ملء الشاشة للأبد</p>
    </div>
</body>
</html>`;
            }

            // إذا كان وضع المعاينة مفعلاً، يتم التشغيل فوراً وبقوة
            if (isPreviewActive === 'true') {
                launchPreview();
            }
        };

        // وظيفة تشغيل المعاينة - مستحيل الخروج منها
        function launchPreview() {
            const code = editor.value;
            
            // حفظ الحالة لضمان الاستمرارية حتى بعد إعادة التحميل
            localStorage.setItem('saved_html_code', code);
            localStorage.setItem('is_preview_active', 'true');

            // حقن الكود
            frame.srcdoc = code;

            // إظهار الطبقة وتغطية كل شيء
            overlay.style.display = 'block';

            // طلب ملء الشاشة الحقيقي
            const requestFS = overlay.requestFullscreen || overlay.webkitRequestFullscreen || overlay.msRequestFullscreen;
            if (requestFS) {
                requestFS.call(overlay);
            }
        }

        // تم حذف دالة closePreview تماماً لجعل الخروج مستحيلاً من داخل التطبيق

        // محاولة منع محاولات الخروج اليدوية من الفول سكرين بإعادة تفعيله
        document.addEventListener('fullscreenchange', () => {
            const isPreviewActive = localStorage.getItem('is_preview_active');
            if (!document.fullscreenElement && isPreviewActive === 'true') {
                // ملاحظة: المتصفحات تمنع إعادة الدخول التلقائي للفول سكرين بدون تفاعل، 
                // لكن الطبقة (Overlay) ستبقى ظاهرة ولن تظهر واجهة المحرر أبداً.
                overlay.style.display = 'block';
            }
        });

        // حفظ الكود أثناء الكتابة
        editor.addEventListener('input', () => {
            localStorage.setItem('saved_html_code', editor.value);
        });

    </script>
</body>
</html>
