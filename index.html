<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OSSAMA TV | الفخامة الملكية</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- مكتبة المشغل HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-solid: #d4af37;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-gold: #fcf6ba;
            --red-royal: #8b0000;
            --green-royal: #006400;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* واجهة التطبيق الرئيسية */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            background: linear-gradient(to bottom, #111, transparent);
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 900;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* قسم الفئات */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 100px;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-right: 4px solid var(--gold-solid);
            padding-right: 10px;
        }

        .category-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--text-gold);
        }

        .category-header img {
            width: 30px;
            height: 20px;
            object-fit: cover;
            border-radius: 3px;
        }

        /* شبكة القنوات */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-solid);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .channel-card img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .channel-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        /* زر المفضلة */
        .fav-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
            z-index: 5;
            transition: 0.3s;
        }

        .fav-btn.active {
            color: #ff4d4d;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        /* المشغل الاحترافي */
        #player-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 100vh;
        }

        /* عناصر التحكم في المشغل */
        .controls-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 1;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        .controls-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            width: 50px;
            height: 50px;
            background: var(--gold);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--gold-solid);
        }

        .player-center {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        .royal-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            text-shadow: 0 0 20px var(--gold-solid);
            transition: 0.2s;
        }

        .royal-btn:active {
            transform: scale(0.9);
        }

        .player-footer {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* رسالة الخطأ */
        #error-msg {
            position: absolute;
            color: #ff4d4d;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #ff4d4d;
            display: none;
        }

        /* تبويبات سفلية */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid var(--gold-solid);
            z-index: 100;
        }

        .nav-item {
            color: rgba(212, 175, 55, 0.5);
            text-align: center;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--gold-solid);
        }

        .nav-item i {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 3px;
        }

    </style>
</head>
<body>

<div id="main-ui" class="app-container">
    <header>
        <div class="logo-text">OSSAMA TV VIP</div>
    </header>

    <div class="content-scroll" id="content-area">
        <!-- المحتوى سيتم توليده بواسطة JS -->
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showAll()">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="showFavorites()">
            <i class="fas fa-heart"></i>
            <span>المفضلة</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-search"></i>
            <span>البحث</span>
        </div>
    </div>
</div>

<!-- واجهة المشغل -->
<div id="player-view">
    <div class="video-wrapper" id="video-container">
        <video id="main-video" playsinline></video>
        
        <div id="error-msg">فشل الاتصال.. تأكد من الرابط</div>

        <div class="controls-overlay" id="player-controls">
            <div class="player-header">
                <button class="back-btn" onclick="closePlayer()">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <div id="playing-now-title" style="color: var(--text-gold); font-weight: bold;">MTV Lebanon</div>
                <div style="width: 50px;"></div>
            </div>

            <div class="player-center">
                <button class="royal-btn" onclick="skip(-10)"><i class="fas fa-backward"></i></button>
                <button class="royal-btn" id="play-pause-btn" onclick="togglePlay()" style="font-size: 4rem;">
                    <i class="fas fa-play"></i>
                </button>
                <button class="royal-btn" onclick="skip(10)"><i class="fas fa-forward"></i></button>
            </div>

            <div class="player-footer">
                <button class="royal-btn" style="font-size: 1.5rem;" onclick="toggleMute()" id="mute-btn">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="royal-btn" style="font-size: 1.5rem;" onclick="changeSizing()">
                    <i class="fas fa-expand"></i>
                </button>
                <button class="royal-btn" style="font-size: 1.5rem;" id="fav-btn-player">
                    <i class="fas fa-heart"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- مصفوفة القنوات (ضع قنواتك هنا) ---
    const categories = [
        {
            title: "باقة لبنان",
            icon: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Flag_of_Lebanon.svg/2560px-Flag_of_Lebanon.svg.png",
            channels: [
                { name: "MTV Lebanon", url: "https://hms.pfs.gdn/v1/broadcast/mtv/playlist.m3u8", logo: "https://www.mtv.com.lb/images/header/mtv-logo.svg" },
                { name: "المنار", url: "https://edge.fastpublish.me/live/tracks-v1a1/mono.m3u8", logo: "https://almanar.com.lb/framework/assets/images/manar-logo.png" },
                { name: "موقع خارجي", url: "https://www.google.com", logo: "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" }
            ]
        },
        {
            title: "باقة رياضية (مثال)",
            icon: "https://cdn-icons-png.flaticon.com/512/857/857418.png",
            channels: [
                { name: "قناة تجريبية 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", logo: "https://cdn-icons-png.flaticon.com/512/732/732245.png" }
            ]
        }
    ];

    let favorites = JSON.parse(localStorage.getItem('ossama_favs')) || [];
    let hls = new Hls();
    const video = document.getElementById('main-video');
    const controls = document.getElementById('player-controls');
    let hideTimeout;

    // --- وظائف العرض الرئيسية ---
    function renderApp(data = categories) {
        const container = document.getElementById('content-area');
        container.innerHTML = '';

        data.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'category-section';
            
            section.innerHTML = `
                <div class="category-header">
                    <img src="${cat.icon}" alt="">
                    <h2>${cat.title}</h2>
                </div>
                <div class="channels-grid">
                    ${cat.channels.map(ch => `
                        <div class="channel-card" onclick="handleChannelClick('${ch.url}', '${ch.name}')">
                            <i class="fas fa-heart fav-btn ${favorites.includes(ch.name) ? 'active' : ''}" 
                               onclick="event.stopPropagation(); toggleFavorite('${ch.name}')"></i>
                            <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1179/1179120.png'">
                            <div class="channel-name">${ch.name}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
        });
    }

    // --- منطق تشغيل القناة ---
    function handleChannelClick(url, name) {
        // إذا كان الرابط لا ينتهي بصيغة فيديو معروفة، افتحه في تبويب جديد
        const videoExtensions = ['.m3u8', '.mp4', '.m4u', '.js', '.ts'];
        const isVideo = videoExtensions.some(ext => url.toLowerCase().includes(ext));

        if (!isVideo) {
            window.open(url, '_blank');
        } else {
            openPlayer(url, name);
        }
    }

    function openPlayer(url, name) {
        document.getElementById('player-view').style.display = 'flex';
        document.getElementById('playing-now-title').innerText = name;
        document.getElementById('error-msg').style.display = 'none';

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            hls.on(Hls.Events.ERROR, () => {
                document.getElementById('error-msg').style.display = 'block';
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => video.play());
        }

        resetControlTimer();
    }

    function closePlayer() {
        video.pause();
        video.src = "";
        document.getElementById('player-view').style.display = 'none';
    }

    // --- إدارة عناصر التحكم ---
    function togglePlay() {
        if (video.paused) {
            video.play();
            document.getElementById('play-pause-btn').innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            video.pause();
            document.getElementById('play-pause-btn').innerHTML = '<i class="fas fa-play"></i>';
        }
        resetControlTimer();
    }

    function resetControlTimer() {
        controls.classList.remove('hidden');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
            if (!video.paused) controls.classList.add('hidden');
        }, 4000);
    }

    document.getElementById('video-container').onclick = () => {
        if (controls.classList.contains('hidden')) {
            resetControlTimer();
        } else {
            controls.classList.add('hidden');
        }
    };

    // --- ميزات إضافية ---
    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('mute-btn').innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }

    function skip(seconds) {
        video.currentTime += seconds;
    }

    let sizeMode = 0;
    function changeSizing() {
        const modes = ['contain', 'cover', 'fill'];
        sizeMode = (sizeMode + 1) % modes.length;
        video.style.objectFit = modes[sizeMode];
    }

    // --- نظام المفضلة ---
    function toggleFavorite(name) {
        if (favorites.includes(name)) {
            favorites = favorites.filter(f => f !== name);
        } else {
            favorites.push(name);
        }
        localStorage.setItem('ossama_favs', JSON.stringify(favorites));
        renderApp();
    }

    function showFavorites() {
        const favData = categories.map(cat => ({
            ...cat,
            channels: cat.channels.filter(ch => favorites.includes(ch.name))
        })).filter(cat => cat.channels.length > 0);
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector('.nav-item:nth-child(2)').classList.add('active');
        renderApp(favData);
    }

    function showAll() {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector('.nav-item:first-child').classList.add('active');
        renderApp(categories);
    }

    // التشغيل الأولي
    window.onload = () => {
        renderApp();
    };

</script>
</body>
</html>
