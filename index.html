<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل M3U8 المتطور | Eyevinn Player</title>
    <!-- Eyevinn HTML Player CSS -->
    <link rel="stylesheet" href="https://player.eyevinn.technology/v0.4.2/build/eyevinn-html-player.css">
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full space-y-6">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-400">مشغل البث المباشر</h1>
            <p class="text-slate-400">أدخل رابط M3U8 لبدء المشاهدة باستخدام تقنية Eyevinn</p>
        </header>

        <!-- Input Section -->
        <div class="glass-card p-6 rounded-2xl shadow-xl space-y-4">
            <div class="flex flex-col md:flex-row gap-3">
                <input 
                    type="text" 
                    id="m3u8-url" 
                    placeholder="ضع رابط الـ M3U8 هنا (e.g. https://.../master.m3u8)"
                    class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    value="https://maitv-vod.lab.eyevinn.technology/VINN.mp4/master.m3u8"
                >
                <button 
                    onclick="loadVideo()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-colors duration-200 shadow-lg active:scale-95"
                >
                    تشغيل
                </button>
            </div>
            <p id="status-msg" class="text-sm text-slate-500 text-center"></p>
        </div>

        <!-- Player Container -->
        <div class="relative group">
            <div id="player-wrapper">
                <!-- المشغل سيظهر هنا -->
            </div>
        </div>

        <!-- Instructions/Footer -->
        <footer class="text-center text-slate-500 text-sm pt-4">
            <p>يدعم HLS و DASH عبر مكتبات Hls.js و Shaka Player</p>
        </footer>
    </div>

    <!-- Eyevinn HTML Player Javascript -->
    <script src="https://player.eyevinn.technology/v0.4.2/build/eyevinn-html-player.js" type="text/javascript"></script>

    <script>
        let currentPlayer = null;

        /**
         * دالة تحميل الفيديو وتشغيله
         */
        async function loadVideo() {
            const url = document.getElementById('m3u8-url').value.trim();
            const statusMsg = document.getElementById('status-msg');
            const wrapper = document.getElementById('player-wrapper');

            if (!url) {
                showStatus("يرجى إدخال رابط صحيح", "text-red-400");
                return;
            }

            // 1. تنظيف المشغل القديم إذا وجد لتجنب تسرب الذاكرة
            if (window.myPlayerInstance) {
                try {
                    window.myPlayerInstance.destroy();
                    // إعادة بناء الحاوية لأن المشغل قد يزيل عناصر DOM الأساسية
                    wrapper.innerHTML = ''; 
                } catch (e) {
                    console.error("خطأ أثناء تدمير المشغل السابق:", e);
                }
            }

            showStatus("جاري تحميل البث...", "text-blue-400");

            try {
                // 2. إعداد المشغل الجديد
                // ملاحظة: المكتبة توفر وظيفة setupEyevinnPlayer عالمياً عبر CDN
                const player = await setupEyevinnPlayer('player-wrapper', url);
                
                window.myPlayerInstance = player;
                
                // 3. التشغيل مع كتم الصوت (كتم الصوت ضروري للتشغيل التلقائي في أغلب المتصفحات)
                player.play(true);
                
                showStatus("يتم التشغيل الآن بنجاح ✅", "text-green-400");
            } catch (error) {
                console.error("Player Error:", error);
                showStatus("فشل تحميل الفيديو. تأكد من صحة الرابط أو دعم CORS.", "text-red-400");
            }
        }

        function showStatus(msg, colorClass) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.textContent = msg;
            statusMsg.className = `text-sm text-center ${colorClass}`;
        }

        // تشغيل الفيديو الافتراضي عند تحميل الصفحة
        window.onload = () => {
            loadVideo();
        };
    </script>
</body>
</html>
